<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gadi Ayo — Parent App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Outfit', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1) } 50% { opacity:0.4; transform:scale(1.5) } }
    @keyframes ripple { 0% { transform:scale(0.8); opacity:0.6 } 100% { transform:scale(2.4); opacity:0 } }
    @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
    @keyframes livePulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
    @keyframes sheetUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Route path — 22 natural points ───────────────────────
    const ROUTE_PATH = [
      [0.08, 0.92], [0.11, 0.88], [0.14, 0.84], [0.17, 0.80],
      [0.20, 0.76], [0.24, 0.72], [0.27, 0.68], [0.31, 0.64],
      [0.34, 0.60], [0.37, 0.56], [0.40, 0.52], [0.43, 0.48],
      [0.46, 0.45], [0.49, 0.42], [0.53, 0.39], [0.57, 0.36],
      [0.61, 0.33], [0.65, 0.29], [0.69, 0.26], [0.73, 0.22],
      [0.78, 0.18], [0.84, 0.14],
    ];

    const SCHOOL_POS  = { x: 0.84, y: 0.14 };
    const PICKUP_STOP = { x: 0.34, y: 0.60 }; // Effa's pickup point — red marker

    const DRIVER = { name: "Ramesh Thapa", phone: "98XXXXXXXX", van: "Van 8", rating: "4.8" };

    // ── Phone Frame ───────────────────────────────────────────
    const PhoneFrame = ({ children }) => (
      <div style={{ minHeight:"100vh", background:"#0f0f0f", display:"flex", alignItems:"center", justifyContent:"center", padding:"32px 16px" }}>
        <div style={{ width:390, minHeight:844, background:"#fff", borderRadius:52, overflow:"hidden", boxShadow:"0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8)", position:"relative", display:"flex", flexDirection:"column" }}>
          {/* Notch */}
          <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:120, height:34, background:"#1a1a1a", borderRadius:"0 0 20px 20px", zIndex:100 }} />
          {/* Status bar */}
          <div style={{ height:44, display:"flex", alignItems:"flex-end", justifyContent:"space-between", padding:"0 28px 6px", fontSize:12, fontWeight:600, color:"#111", flexShrink:0, position:"relative", zIndex:99 }}>
            <span>9:41</span>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}><span>●●●</span><span>WiFi</span><span>🔋</span></div>
          </div>
          {children}
        </div>
      </div>
    );

    // ── Home Screen ───────────────────────────────────────────
    const HomeScreen = ({ onTapTrip }) => {
      const trips = [
        { id:1, type:"Pickup", van:"Van 8", live:true,  batch:"Batch 1" },
        { id:2, type:"Drop",   van:"Van 8", live:false, batch:"Batch 1" },
      ];

      return (
        <div style={{ flex:1, background:"#f7f7f5", display:"flex", flexDirection:"column" }}>
          {/* Header */}
          <div style={{ background:"#fff", padding:"20px 24px 18px", borderBottom:"1px solid #f0f0f0" }}>
            <div style={{ fontSize:13, color:"#aaa", fontWeight:500, marginBottom:2 }}>Welcome back</div>
            <div style={{ fontSize:22, fontWeight:800, color:"#111", letterSpacing:"-0.03em" }}>Prakash 👋</div>
          </div>

          <div style={{ flex:1, padding:"20px", overflowY:"auto" }}>
            {/* School group */}
            <div style={{ animation:"fadeUp 0.4s ease both" }}>
              {/* School header */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:19, fontWeight:800, color:"#111", letterSpacing:"-0.02em" }}>Gyan Sanskar</div>
              </div>

              {/* Learner group */}
              <div style={{ background:"#fff", borderRadius:20, border:"1px solid #efefef", overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.04)" }}>
                {/* Learner header */}
                <div style={{ padding:"14px 18px 10px", borderBottom:"1px solid #f5f5f5", display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:32, height:32, borderRadius:"50%", background:"#f0f4ff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>👧</div>
                  <div style={{ fontSize:14, fontWeight:700, color:"#111" }}>Effa Bajracharya</div>
                </div>

                {/* Trip rows */}
                {trips.map((trip, i) => (
                  <div key={trip.id} onClick={() => onTapTrip(trip)}
                    style={{ padding:"13px 18px 13px 36px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:i<trips.length-1?"1px solid #f9f9f9":"none", cursor:"pointer", background:"#fff", transition:"background 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.background="#fafafa"}
                    onMouseLeave={e => e.currentTarget.style.background="#fff"}
                  >
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ width:36, height:36, borderRadius:12, background:trip.type==="Pickup"?"#f0fdf4":"#eff6ff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>
                        {trip.type==="Pickup" ? "🌅" : "🏠"}
                      </div>
                      <div>
                        <div style={{ fontSize:14, fontWeight:600, color:"#111", marginBottom:2 }}>{trip.type}</div>
                        <div style={{ fontSize:12, color:"#aaa" }}>{trip.van} · {trip.batch}</div>
                      </div>
                    </div>

                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      {trip.live ? (
                        <div style={{ display:"flex", alignItems:"center", gap:5, background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:20, padding:"5px 10px" }}>
                          <div style={{ width:6, height:6, borderRadius:"50%", background:"#22c55e", animation:"livePulse 1.5s infinite" }}/>
                          <span style={{ fontSize:11, fontWeight:700, color:"#16a34a" }}>LIVE</span>
                        </div>
                      ) : (
                        <span style={{ fontSize:11, color:"#ccc", fontWeight:500 }}>Inactive</span>
                      )}
                      <span style={{ color:"#ddd", fontSize:16 }}>›</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── Inactive Screen ───────────────────────────────────────
    const InactiveScreen = ({ trip, onBack }) => (
      <div style={{ flex:1, background:"#f7f7f5", display:"flex", flexDirection:"column", animation:"fadeIn 0.25s ease" }}>
        <div style={{ background:"#fff", padding:"16px 20px", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:14 }}>
          <button onClick={onBack} style={{ background:"#f5f5f5", border:"none", borderRadius:10, width:36, height:36, fontSize:16, cursor:"pointer" }}>←</button>
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#111" }}>Effa · {trip.type}</div>
            <div style={{ fontSize:12, color:"#999" }}>{trip.van}</div>
          </div>
        </div>
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, textAlign:"center" }}>
          <div style={{ fontSize:56, marginBottom:20 }}>🚐</div>
          <div style={{ fontSize:18, fontWeight:700, color:"#111", marginBottom:8 }}>Van not active</div>
          <div style={{ fontSize:14, color:"#aaa", lineHeight:1.6 }}>The {trip.type.toLowerCase()} trip hasn't started yet. You'll get a notification when the van is on the way.</div>
        </div>
      </div>
    );

    // ── Live Map Screen ───────────────────────────────────────
    const LiveMapScreen = ({ trip, onBack }) => {
      const [vanIdx, setVanIdx]       = useState(0);
      const [trail, setTrail]         = useState([ROUTE_PATH[0]]);
      const [tripEnded, setTripEnded] = useState(false);
      const W = 390, H = 520;

      useEffect(() => {
        const EFFA_STOP_IDX = 8; // index of PICKUP_STOP in ROUTE_PATH
        let paused = false;
        let mover;

        const step = () => {
          setVanIdx(p => {
            if (p >= ROUTE_PATH.length - 1) {
              clearInterval(mover);
              setTimeout(() => setTripEnded(true), 600);
              return p;
            }
            const next = p + 1;
            setTrail(t => [...t, ROUTE_PATH[next]]);

            // Pause at Effa's stop
            if (next === EFFA_STOP_IDX && !paused) {
              paused = true;
              clearInterval(mover);
              setTimeout(() => {
                mover = setInterval(step, 2000);
              }, 5000);
            }

            return next;
          });
        };

        mover = setInterval(step, 2000);
        return () => clearInterval(mover);
      }, []);

      const van      = ROUTE_PATH[vanIdx];
      const allPts   = ROUTE_PATH.map(([x,y]) => `${x*W},${y*H}`).join(" ");
      const trailPts = trail.map(([x,y]) => `${x*W},${y*H}`).join(" ");

      // smooth cubic bezier through points helper
      const smoothPath = (pts, w, h) => {
        if (pts.length < 2) return "";
        let d = `M ${pts[0][0]*w} ${pts[0][1]*h}`;
        for (let i = 1; i < pts.length; i++) {
          const prev = pts[i-1], curr = pts[i];
          const cpx1 = (prev[0] + (curr[0]-prev[0])*0.5) * w;
          const cpy1 = prev[1] * h;
          const cpx2 = (prev[0] + (curr[0]-prev[0])*0.5) * w;
          const cpy2 = curr[1] * h;
          d += ` C ${cpx1} ${cpy1}, ${cpx2} ${cpy2}, ${curr[0]*w} ${curr[1]*h}`;
        }
        return d;
      };

      const routeD = smoothPath(ROUTE_PATH, W, H);
      const trailD = smoothPath(trail, W, H);

      return (
        <div style={{ flex:1, position:"relative", display:"flex", flexDirection:"column", background:"#e8f0e8" }}>

          {/* Map fills everything */}
          <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
            <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{ position:"absolute", inset:0 }} preserveAspectRatio="xMidYMid slice">
              <defs>
                <pattern id="pg" width="28" height="28" patternUnits="userSpaceOnUse">
                  <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#d0e8d0" strokeWidth="0.7"/>
                </pattern>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="3" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>

              {/* Base map */}
              <rect width={W} height={H} fill="#deeede"/>
              <rect width={W} height={H} fill="url(#pg)"/>

              {/* Green areas */}
              <ellipse cx={W*0.15} cy={H*0.3} rx={W*0.1} ry={H*0.08} fill="#c8e6c8" opacity="0.7"/>
              <ellipse cx={W*0.7} cy={H*0.7} rx={W*0.12} ry={H*0.1} fill="#c8e6c8" opacity="0.6"/>
              <rect x={W*0.55} y={H*0.1} width={W*0.15} height={H*0.12} rx={8} fill="#c8e6c8" opacity="0.5"/>

              {/* Background roads */}
              <path d={`M 0,${H*0.5} Q ${W*0.3},${H*0.48} ${W*0.6},${H*0.5} Q ${W*0.8},${H*0.52} ${W},${H*0.48}`} stroke="#fff" strokeWidth="12" fill="none" strokeLinecap="round" opacity="0.8"/>
              <path d={`M ${W*0.4},0 Q ${W*0.42},${H*0.35} ${W*0.43},${H*0.48}`} stroke="#fff" strokeWidth="9" fill="none" strokeLinecap="round" opacity="0.7"/>
              <path d={`M 0,${H*0.75} Q ${W*0.2},${H*0.72} ${W*0.35},${H*0.6}`} stroke="#fff" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.6"/>
              <path d={`M ${W*0.6},${H*0.33} Q ${W*0.75},${H*0.28} ${W},${H*0.25}`} stroke="#fff" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.6"/>

              {/* Planned route — dotted grey */}
              <path d={routeD} fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeDasharray="8 6" strokeLinecap="round" opacity="0.5"/>

              {/* Driven trail — solid blue */}
              {trail.length > 1 && <path d={trailD} fill="none" stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>}

              {/* School marker */}
              <circle cx={SCHOOL_POS.x*W} cy={SCHOOL_POS.y*H} r={16} fill="#111"/>
              <text x={SCHOOL_POS.x*W} y={SCHOOL_POS.y*H+6} textAnchor="middle" fontSize="14" fill="#fff">🏫</text>

              {/* Effa's pickup stop — red pin */}
              <g>
                <circle cx={PICKUP_STOP.x*W} cy={PICKUP_STOP.y*H} r={18} fill="#ef4444" opacity="0.12"/>
                <path d={`M${PICKUP_STOP.x*W} ${PICKUP_STOP.y*H-18} 
                  C${PICKUP_STOP.x*W-10} ${PICKUP_STOP.y*H-18} 
                   ${PICKUP_STOP.x*W-10} ${PICKUP_STOP.y*H-8} 
                   ${PICKUP_STOP.x*W} ${PICKUP_STOP.y*H+4}
                  C${PICKUP_STOP.x*W+10} ${PICKUP_STOP.y*H-8}
                   ${PICKUP_STOP.x*W+10} ${PICKUP_STOP.y*H-18}
                   ${PICKUP_STOP.x*W} ${PICKUP_STOP.y*H-18}Z`}
                  fill="#ef4444"/>
                <circle cx={PICKUP_STOP.x*W} cy={PICKUP_STOP.y*H-11} r={4} fill="#fff"/>
                {/* Label */}
                <rect x={PICKUP_STOP.x*W+14} y={PICKUP_STOP.y*H-22} width={72} height={20} rx={6} fill="white" opacity="0.95"/>
                <text x={PICKUP_STOP.x*W+50} y={PICKUP_STOP.y*H-8} textAnchor="middle" fontSize="9" fontWeight="700" fill="#ef4444">Effa's Stop</text>
              </g>

              {/* Van — ripple + marker */}
              <circle cx={van[0]*W} cy={van[1]*H} r={26} fill="#3b82f6" opacity="0.12" style={{animation:"ripple 2s ease-out infinite"}}/>
              <circle cx={van[0]*W} cy={van[1]*H} r={16} fill="#3b82f6" filter="url(#glow)"/>
              <circle cx={van[0]*W} cy={van[1]*H} r={14} fill="#3b82f6"/>
              <text x={van[0]*W} y={van[1]*H+5} textAnchor="middle" fontSize="13">🚐</text>
            </svg>

            {/* Top bar */}
            <div style={{ position:"absolute", top:12, left:12, right:12 }}>
              <div style={{ background:"rgba(255,255,255,0.96)", backdropFilter:"blur(12px)", borderRadius:18, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 4px 24px rgba(0,0,0,0.1)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <button onClick={onBack} style={{ background:"#f5f5f5", border:"none", borderRadius:10, width:32, height:32, fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#111" }}>Van 8 · Pickup</div>
                    <div style={{ fontSize:11, color:"#999" }}>Effa Bajracharya</div>
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:5, background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:20, padding:"5px 10px" }}>
                  <div style={{ width:6, height:6, borderRadius:"50%", background:"#22c55e", animation:"livePulse 1.5s infinite" }}/>
                  <span style={{ fontSize:11, fontWeight:700, color:"#16a34a" }}>LIVE</span>
                </div>
              </div>
            </div>

            {/* Re-center button */}
            <div style={{ position:"absolute", bottom:120, right:16 }}>
              <button style={{ width:42, height:42, borderRadius:"50%", background:"rgba(255,255,255,0.96)", border:"none", boxShadow:"0 2px 12px rgba(0,0,0,0.15)", fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>⊙</button>
            </div>

            {/* Trip ended overlay */}
            {tripEnded && (
              <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.55)", display:"flex", alignItems:"center", justifyContent:"center", animation:"fadeIn 0.4s ease", zIndex:50 }}>
                <div style={{ background:"#fff", borderRadius:24, padding:"36px 28px", margin:"0 24px", textAlign:"center", boxShadow:"0 24px 60px rgba(0,0,0,0.3)", animation:"fadeUp 0.4s ease" }}>
                  <div style={{ fontSize:52, marginBottom:16 }}>🏫</div>
                  <div style={{ fontSize:20, fontWeight:800, color:"#111", letterSpacing:"-0.02em", marginBottom:8 }}>Trip has ended</div>
                  <div style={{ fontSize:14, color:"#999", marginBottom:28, lineHeight:1.6 }}>Effa's van has arrived at Gyan Sanskar.</div>
                  <button onClick={onBack} style={{ width:"100%", padding:"15px", borderRadius:16, background:"#111", color:"#fff", border:"none", fontSize:15, fontWeight:700, cursor:"pointer" }}>Go to Home Screen</button>
                </div>
              </div>
            )}
          </div>

          {/* Bottom Sheet — always visible driver info */}
          <div style={{ background:"#fff", borderTop:"1px solid #f0f0f0", padding:"16px 20px 28px", zIndex:20 }}>
            <div style={{ width:36, height:4, borderRadius:2, background:"#e0e0e0", margin:"0 auto 16px" }}/>
            <div style={{ fontSize:11, fontWeight:600, color:"#aaa", letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:12 }}>Driver</div>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ width:44, height:44, borderRadius:"50%", background:"#f0f0f0", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>👨</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:700, color:"#111", marginBottom:2 }}>{DRIVER.name}</div>
                <div style={{ fontSize:12, color:"#aaa" }}>{DRIVER.van} · ⭐ {DRIVER.rating}</div>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button style={{ width:40, height:40, borderRadius:12, background:"#f0fdf4", border:"1px solid #bbf7d0", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, cursor:"pointer" }}>📞</button>
                <button style={{ width:40, height:40, borderRadius:12, background:"#eff6ff", border:"1px solid #bfdbfe", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, cursor:"pointer" }}>💬</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── Main App ──────────────────────────────────────────────
    const App = () => {
      const [screen, setScreen]   = useState("home");
      const [activeTrip, setActiveTrip] = useState(null);

      const handleTap = (trip) => {
        setActiveTrip(trip);
        setScreen(trip.live ? "live" : "inactive");
      };

      return (
        <PhoneFrame>
          {screen === "home"     && <HomeScreen onTapTrip={handleTap} />}
          {screen === "inactive" && <InactiveScreen trip={activeTrip} onBack={() => setScreen("home")} />}
          {screen === "live"     && <LiveMapScreen  trip={activeTrip} onBack={() => setScreen("home")} />}
        </PhoneFrame>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
