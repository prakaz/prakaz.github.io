<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gadi Ayo — Driver App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Outfit', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1) } 50% { opacity:0.5; transform:scale(1.4) } }
    @keyframes ripple { 0% { transform:scale(0.8); opacity:1 } 100% { transform:scale(2.2); opacity:0 } }
    @keyframes slideUp { from { transform:translateY(100%) } to { transform:translateY(0) } }
    @keyframes scanLine { 0% { top:10% } 100% { top:85% } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TRIP_PLANS = [
      { id: 1, van: "Van 8", type: "Pickup", batch: "Batch 1", stops: 6, students: 14, startTime: "7:00 AM" },
      { id: 2, van: "Van 8", type: "Drop", batch: "Batch 1", stops: 6, students: 14, startTime: "2:30 PM" },
      { id: 3, van: "Van 8", type: "Pickup", batch: "Batch 2", stops: 4, students: 9, startTime: "8:30 AM" },
    ];

    const ROUTE_PATH = [
      [0.1, 0.85], [0.18, 0.78], [0.25, 0.70], [0.3, 0.62],
      [0.38, 0.55], [0.44, 0.48], [0.5, 0.42], [0.57, 0.36],
      [0.63, 0.30], [0.70, 0.25], [0.78, 0.20], [0.85, 0.15],
    ];

    const STOPS = [
      { x: 0.25, y: 0.70, name: "Stop 1" },
      { x: 0.44, y: 0.48, name: "Stop 2" },
      { x: 0.63, y: 0.30, name: "Stop 3" },
    ];

    const SCHOOL_POS = { x: 0.85, y: 0.15 };

    // ── Phone Frame ──────────────────────────────────────────
    const PhoneFrame = ({ children }) => (
      <div style={{ minHeight:"100vh", background:"#0f0f0f", display:"flex", alignItems:"center", justifyContent:"center", padding:"32px 16px" }}>
        <div style={{ width:390, minHeight:844, background:"#fff", borderRadius:52, overflow:"hidden", boxShadow:"0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px rgba(0,0,0,0.8)", position:"relative", display:"flex", flexDirection:"column" }}>
          <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:120, height:34, background:"#1a1a1a", borderRadius:"0 0 20px 20px", zIndex:100 }} />
          <div style={{ height:44, background:"transparent", display:"flex", alignItems:"flex-end", justifyContent:"space-between", padding:"0 28px 6px", fontSize:12, fontWeight:600, color:"#111", flexShrink:0, position:"relative", zIndex:99 }}>
            <span>9:41</span>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              <span>●●●</span><span>WiFi</span><span>🔋</span>
            </div>
          </div>
          {children}
        </div>
      </div>
    );

    // ── QR Screen ────────────────────────────────────────────
    const QRScreen = ({ onScan }) => {
      const [scanning, setScanning] = useState(false);
      const [scanned, setScanned] = useState(false);

      const handleScan = () => {
        setScanning(true);
        setTimeout(() => setScanned(true), 2000);
        setTimeout(() => onScan(), 2800);
      };

      return (
        <div style={{ flex:1, background:"#0a0a0a", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, animation:"fadeIn 0.4s ease" }}>
          <div style={{ marginBottom:40, textAlign:"center" }}>
            <div style={{ fontSize:28, fontWeight:800, color:"#fff", letterSpacing:"-0.03em", marginBottom:8 }}>Gadi Ayo 🚐</div>
            <div style={{ fontSize:14, color:"#666" }}>Driver App</div>
          </div>

          <div style={{ width:240, height:240, position:"relative", marginBottom:40, borderRadius:20, overflow:"hidden" }}>
            <div style={{ width:"100%", height:"100%", background:"#111", borderRadius:20, position:"relative" }}>
              {[
                {top:12,left:12,borderTop:"3px solid #4ade80",borderLeft:"3px solid #4ade80"},
                {top:12,right:12,borderTop:"3px solid #4ade80",borderRight:"3px solid #4ade80"},
                {bottom:12,left:12,borderBottom:"3px solid #4ade80",borderLeft:"3px solid #4ade80"},
                {bottom:12,right:12,borderBottom:"3px solid #4ade80",borderRight:"3px solid #4ade80"}
              ].map((s,i) => <div key={i} style={{ position:"absolute", width:28, height:28, borderRadius:3, ...s }} />)}

              {scanning && !scanned && (
                <div style={{ position:"absolute", left:"10%", right:"10%", height:2, background:"linear-gradient(90deg, transparent, #4ade80, transparent)", animation:"scanLine 1s ease-in-out infinite", top:"10%" }} />
              )}
              {scanned && (
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(74,222,128,0.15)", animation:"fadeIn 0.3s ease" }}>
                  <div style={{ fontSize:64, color:"#4ade80" }}>✓</div>
                </div>
              )}
              {!scanning && (
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:8 }}>
                  <div style={{ fontSize:40, opacity:0.3 }}>⬛</div>
                  <div style={{ fontSize:12, color:"#444" }}>Point at QR code</div>
                </div>
              )}
            </div>
          </div>

          <div style={{ fontSize:14, color:"#555", textAlign:"center", marginBottom:40, lineHeight:1.6 }}>
            Ask your admin to show<br/>your personal QR code
          </div>

          <button onClick={handleScan} disabled={scanning} style={{ width:"100%", padding:"18px", borderRadius:18, background:scanning?"#1a1a1a":"#4ade80", color:scanning?"#555":"#000", border:"none", fontSize:16, fontWeight:700, cursor:scanning?"default":"pointer", transition:"all 0.2s ease" }}>
            {scanned ? "✓ Verified!" : scanning ? "Scanning..." : "Scan QR Code"}
          </button>
        </div>
      );
    };

    // ── Home Screen ──────────────────────────────────────────
    const HomeScreen = ({ onSelectTrip, onLogout }) => (
      <div style={{ flex:1, background:"#f7f7f5", display:"flex", flexDirection:"column" }}>
        <div style={{ background:"#fff", padding:"20px 24px 16px", borderBottom:"1px solid #f0f0f0" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:20, fontWeight:800, letterSpacing:"-0.03em", color:"#111" }}>Good morning 👋</div>
              <div style={{ fontSize:13, color:"#999", marginTop:2 }}>Ramesh Thapa · Van 8</div>
            </div>
            <button onClick={onLogout} style={{ background:"#f5f5f5", border:"none", borderRadius:12, padding:"8px 14px", fontSize:13, fontWeight:600, color:"#666", cursor:"pointer" }}>Logout</button>
          </div>
        </div>

        <div style={{ flex:1, padding:"20px", overflowY:"auto" }}>
          <div style={{ fontSize:12, fontWeight:600, color:"#aaa", letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:14 }}>Your Trip Plans</div>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {TRIP_PLANS.map((trip, i) => (
              <button key={trip.id} onClick={() => onSelectTrip(trip)} style={{ background:"#fff", border:"1px solid #efefef", borderRadius:20, padding:"18px 20px", textAlign:"left", cursor:"pointer", animation:`fadeUp 0.4s ease ${i*0.08}s both`, boxShadow:"0 2px 12px rgba(0,0,0,0.04)" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                  <div style={{ fontSize:11, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase", color:trip.type==="Pickup"?"#16a34a":"#2563eb", background:trip.type==="Pickup"?"#f0fdf4":"#eff6ff", padding:"4px 10px", borderRadius:20 }}>{trip.type}</div>
                  <div style={{ fontSize:13, color:"#bbb", fontWeight:500 }}>{trip.startTime}</div>
                </div>
                <div style={{ fontSize:17, fontWeight:700, color:"#111", letterSpacing:"-0.02em", marginBottom:10 }}>{trip.van} · {trip.type} ({trip.batch})</div>
                <div style={{ display:"flex", gap:16 }}>
                  <div style={{ fontSize:12, color:"#999" }}>{trip.stops} stops</div>
                  <div style={{ fontSize:12, color:"#999" }}>{trip.students} students</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );

    // ── Trip Preview Screen ───────────────────────────────────
    const TripPreviewScreen = ({ trip, onStart, onBack }) => {
      const W = 346, H = 220;
      const pts = ROUTE_PATH.map(([x,y]) => `${x*W},${y*H}`).join(" ");

      return (
        <div style={{ flex:1, background:"#f7f7f5", display:"flex", flexDirection:"column", animation:"fadeIn 0.3s ease" }}>
          <div style={{ background:"#fff", padding:"16px 20px", borderBottom:"1px solid #f0f0f0", display:"flex", alignItems:"center", gap:14 }}>
            <button onClick={onBack} style={{ background:"#f5f5f5", border:"none", borderRadius:10, width:36, height:36, fontSize:16, cursor:"pointer" }}>←</button>
            <div>
              <div style={{ fontSize:16, fontWeight:800, letterSpacing:"-0.02em", color:"#111" }}>{trip.van} · {trip.type} ({trip.batch})</div>
              <div style={{ fontSize:12, color:"#999" }}>Trip Preview</div>
            </div>
          </div>

          <div style={{ flex:1, overflowY:"auto", padding:"20px" }}>
            <div style={{ background:"#e8f0e8", borderRadius:20, overflow:"hidden", marginBottom:20 }}>
              <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block" }}>
                <defs>
                  <pattern id="mapgrid" width="24" height="24" patternUnits="userSpaceOnUse">
                    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#d4e4d4" strokeWidth="0.6"/>
                  </pattern>
                </defs>
                <rect width={W} height={H} fill="#e8f0e8"/>
                <rect width={W} height={H} fill="url(#mapgrid)"/>
                <path d={`M 0,${0.7*H} Q ${0.3*W},${0.65*H} ${0.6*W},${0.4*H} Q ${0.8*W},${0.25*H} ${W},${0.1*H}`} stroke="#fff" strokeWidth="10" fill="none" strokeLinecap="round"/>
                <path d={`M ${0.3*W},0 Q ${0.35*W},${0.5*H} ${0.5*W},${0.42*H}`} stroke="#fff" strokeWidth="7" fill="none" strokeLinecap="round"/>
                <polyline points={pts} fill="none" stroke="#111" strokeWidth="2.5" strokeDasharray="6 5" strokeLinecap="round"/>
                {STOPS.map((s,i) => (
                  <g key={i}>
                    <circle cx={s.x*W} cy={s.y*H} r={8} fill="#fff" stroke="#111" strokeWidth="2"/>
                    <text x={s.x*W} y={s.y*H+4} textAnchor="middle" fontSize="8" fontWeight="700" fill="#111">{i+1}</text>
                  </g>
                ))}
                <circle cx={SCHOOL_POS.x*W} cy={SCHOOL_POS.y*H} r={10} fill="#111"/>
                <text x={SCHOOL_POS.x*W} y={SCHOOL_POS.y*H+4} textAnchor="middle" fontSize="10" fill="#fff">🏫</text>
                <circle cx={ROUTE_PATH[0][0]*W} cy={ROUTE_PATH[0][1]*H} r={7} fill="#4ade80"/>
                <circle cx={ROUTE_PATH[0][0]*W} cy={ROUTE_PATH[0][1]*H} r={12} fill="#4ade80" opacity="0.2"/>
              </svg>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 }}>
              {[
                { label:"Stops", value:trip.stops, type:"pin" },
                { label:"Students", value:trip.students, type:"students" },
                { label:"Start", value:trip.startTime, type:"clock" },
              ].map(s => (
                <div key={s.label} style={{ background:"#fff", borderRadius:16, padding:"14px 12px", textAlign:"center", border:"1px solid #efefef" }}>
                  <div style={{ marginBottom:6, display:"flex", justifyContent:"center", alignItems:"center", height:28 }}>
                    {s.type === "pin" && (
                      <svg width="18" height="22" viewBox="0 0 20 24" fill="none">
                        <path d="M10 0C4.477 0 0 4.477 0 10c0 7 10 14 10 14s10-7 10-14C20 4.477 15.523 0 10 0z" fill="#111"/>
                        <circle cx="10" cy="10" r="3.5" fill="#fff"/>
                      </svg>
                    )}
                    {s.type === "students" && <span style={{fontSize:20}}>👦</span>}
                    {s.type === "clock" && <span style={{fontSize:20}}>⏰</span>}
                  </div>
                  <div style={{ fontSize:17, fontWeight:800, color:"#111", marginBottom:2 }}>{s.value}</div>
                  <div style={{ fontSize:11, color:"#aaa", fontWeight:500 }}>{s.label}</div>
                </div>
              ))}
            </div>

            <div style={{ background:"#fff", borderRadius:20, border:"1px solid #efefef", overflow:"hidden", marginBottom:20 }}>
              <div style={{ padding:"14px 18px", borderBottom:"1px solid #f5f5f5" }}>
                <span style={{ fontSize:13, fontWeight:700, color:"#111" }}>Route Stops</span>
              </div>
              {STOPS.map((s,i) => (
                <div key={i} style={{ padding:"12px 18px", display:"flex", alignItems:"center", gap:12, borderBottom:i<STOPS.length-1?"1px solid #f9f9f9":"none" }}>
                  <div style={{ width:28, height:28, borderRadius:"50%", background:"#f5f5f5", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, flexShrink:0 }}>{i+1}</div>
                  <div style={{ fontSize:14, fontWeight:500, color:"#333" }}>{s.name}</div>
                </div>
              ))}
              <div style={{ padding:"12px 18px", display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", background:"#111", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12 }}>🏫</div>
                <div style={{ fontSize:14, fontWeight:600, color:"#111" }}>School — Final Destination</div>
              </div>
            </div>
          </div>

          <div style={{ padding:"16px 20px 32px", background:"#fff", borderTop:"1px solid #f0f0f0" }}>
            <button onClick={onStart} style={{ width:"100%", padding:"18px", borderRadius:20, background:"#111", color:"#fff", border:"none", fontSize:17, fontWeight:800, cursor:"pointer", boxShadow:"0 8px 24px rgba(0,0,0,0.2)" }}>
              Start Trip 🚀
            </button>
          </div>
        </div>
      );
    };

    // ── In-Trip Screen ────────────────────────────────────────
    const InTripScreen = ({ trip, onEnd }) => {
      const [vanPos, setVanPos] = useState(0);
      const [trail, setTrail] = useState([ROUTE_PATH[0]]);
      const [elapsed, setElapsed] = useState(0);
      const [showEndConfirm, setShowEndConfirm] = useState(false);
      const W = 390, H = 480;

      useEffect(() => {
        const timer = setInterval(() => setElapsed(e => e+1), 1000);
        const mover = setInterval(() => {
          setVanPos(p => {
            const next = Math.min(p+1, ROUTE_PATH.length-1);
            setTrail(t => [...t, ROUTE_PATH[next]]);
            return next;
          });
        }, 1200);
        return () => { clearInterval(timer); clearInterval(mover); };
      }, []);

      const formatTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      const pts = ROUTE_PATH.map(([x,y]) => `${x*W},${y*H}`).join(" ");
      const trailPts = trail.map(([x,y]) => `${x*W},${y*H}`).join(" ");
      const van = ROUTE_PATH[vanPos];

      return (
        <div style={{ flex:1, position:"relative", background:"#e8f0e8", display:"flex", flexDirection:"column" }}>
          <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
            <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{ position:"absolute", inset:0 }} preserveAspectRatio="xMidYMid slice">
              <defs>
                <pattern id="tripgrid" width="30" height="30" patternUnits="userSpaceOnUse">
                  <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#d4e4d4" strokeWidth="0.8"/>
                </pattern>
              </defs>
              <rect width={W} height={H} fill="#e8f0e8"/>
              <rect width={W} height={H} fill="url(#tripgrid)"/>
              <path d={`M 0,${0.78*H} Q ${0.25*W},${0.7*H} ${0.55*W},${0.45*H} Q ${0.75*W},${0.28*H} ${W},${0.12*H}`} stroke="#fff" strokeWidth="14" fill="none" strokeLinecap="round"/>
              <path d={`M 0,${0.78*H} Q ${0.25*W},${0.7*H} ${0.55*W},${0.45*H} Q ${0.75*W},${0.28*H} ${W},${0.12*H}`} stroke="#f5f5f5" strokeWidth="10" fill="none" strokeLinecap="round" strokeDasharray="20 18"/>
              <path d={`M ${0.28*W},0 Q ${0.32*W},${0.45*H} ${0.44*W},${0.48*H}`} stroke="#fff" strokeWidth="10" fill="none" strokeLinecap="round"/>
              <polyline points={pts} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="7 5" strokeLinecap="round" opacity="0.6"/>
              {trail.length > 1 && <polyline points={trailPts} fill="none" stroke="#3b82f6" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>}
              {STOPS.map((s,i) => (
                <g key={i}>
                  <circle cx={s.x*W} cy={s.y*H} r={10} fill="#fff" stroke="#94a3b8" strokeWidth="2"/>
                  <text x={s.x*W} y={s.y*H+4} textAnchor="middle" fontSize="9" fontWeight="700" fill="#666">{i+1}</text>
                </g>
              ))}
              <circle cx={SCHOOL_POS.x*W} cy={SCHOOL_POS.y*H} r={14} fill="#111"/>
              <text x={SCHOOL_POS.x*W} y={SCHOOL_POS.y*H+5} textAnchor="middle" fontSize="12" fill="#fff">🏫</text>
              <circle cx={van[0]*W} cy={van[1]*H} r={24} fill="#3b82f6" opacity="0.15"/>
              <circle cx={van[0]*W} cy={van[1]*H} r={14} fill="#3b82f6"/>
              <text x={van[0]*W} y={van[1]*H+5} textAnchor="middle" fontSize="12">🚐</text>
            </svg>

            <div style={{ position:"absolute", top:16, left:16, right:16, background:"rgba(255,255,255,0.95)", backdropFilter:"blur(10px)", borderRadius:16, padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 4px 20px rgba(0,0,0,0.1)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:"#22c55e", animation:"pulse 1.5s infinite" }}/>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:"#111" }}>{trip.van} · {trip.type} ({trip.batch})</div>
                  <div style={{ fontSize:11, color:"#999" }}>On Trip</div>
                </div>
              </div>
              <div style={{ fontSize:16, fontWeight:800, color:"#111" }}>{formatTime(elapsed)}</div>
            </div>
          </div>

          <div style={{ padding:"16px 20px 32px", background:"#fff", borderTop:"1px solid #f0f0f0" }}>
            <button onClick={() => setShowEndConfirm(true)} style={{ width:"100%", padding:"18px", borderRadius:20, background:"#ef4444", color:"#fff", border:"none", fontSize:17, fontWeight:800, cursor:"pointer", boxShadow:"0 8px 24px rgba(239,68,68,0.3)" }}>
              End Trip
            </button>
          </div>

          {showEndConfirm && (
            <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", animation:"fadeIn 0.2s ease", zIndex:50 }}>
              <div style={{ background:"#fff", borderRadius:"24px 24px 0 0", padding:"32px 24px 40px", width:"100%", animation:"slideUp 0.3s ease" }}>
                <div style={{ fontSize:18, fontWeight:800, color:"#111", marginBottom:8 }}>End this trip?</div>
                <div style={{ fontSize:14, color:"#888", marginBottom:28, lineHeight:1.5 }}>Trip will be marked as completed and location will stop broadcasting.</div>
                <div style={{ display:"flex", gap:12 }}>
                  <button onClick={() => setShowEndConfirm(false)} style={{ flex:1, padding:"16px", background:"#f5f5f5", border:"none", borderRadius:16, fontSize:15, fontWeight:700, cursor:"pointer", color:"#333" }}>Cancel</button>
                  <button onClick={onEnd} style={{ flex:1, padding:"16px", background:"#ef4444", border:"none", borderRadius:16, fontSize:15, fontWeight:700, cursor:"pointer", color:"#fff" }}>End Trip</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── Completed Screen ──────────────────────────────────────
    const TripCompletedScreen = ({ trip, onHome }) => (
      <div style={{ flex:1, background:"#fff", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, animation:"fadeUp 0.4s ease" }}>
        <div style={{ width:80, height:80, borderRadius:"50%", background:"#f0fdf4", display:"flex", alignItems:"center", justifyContent:"center", fontSize:40, marginBottom:24 }}>✅</div>
        <div style={{ fontSize:24, fontWeight:800, color:"#111", letterSpacing:"-0.03em", marginBottom:8 }}>Trip Completed</div>
        <div style={{ fontSize:14, color:"#999", marginBottom:8 }}>{trip.van} · {trip.type} ({trip.batch})</div>
        <div style={{ fontSize:13, color:"#bbb", marginBottom:48 }}>Great work today 👏</div>
        <button onClick={onHome} style={{ width:"100%", padding:"18px", borderRadius:20, background:"#111", color:"#fff", border:"none", fontSize:16, fontWeight:700, cursor:"pointer" }}>Back to Home</button>
      </div>
    );

    // ── Main App ──────────────────────────────────────────────
    const App = () => {
      const [screen, setScreen] = useState("qr");
      const [selectedTrip, setSelectedTrip] = useState(null);

      return (
        <PhoneFrame>
          {screen === "qr" && <QRScreen onScan={() => setScreen("home")} />}
          {screen === "home" && <HomeScreen onSelectTrip={t => { setSelectedTrip(t); setScreen("preview"); }} onLogout={() => setScreen("qr")} />}
          {screen === "preview" && <TripPreviewScreen trip={selectedTrip} onStart={() => setScreen("intrip")} onBack={() => setScreen("home")} />}
          {screen === "intrip" && <InTripScreen trip={selectedTrip} onEnd={() => setScreen("completed")} />}
          {screen === "completed" && <TripCompletedScreen trip={selectedTrip} onHome={() => setScreen("home")} />}
        </PhoneFrame>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
